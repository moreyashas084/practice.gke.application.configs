name: Dynamic Monorepo GKE Deployer (Bastion Runner)

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest # This can stay public just to parse git text
    outputs:
      teams: ${{ steps.filter.outputs.changes }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Filter Changed Folders
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          team-a: 'team-a/**'
          team-b: 'team-b/**'

  deploy:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.teams != '[]' && needs.detect-changes.outputs.teams != '' }}
    runs-on: self-hosted # <-- TARGETS YOUR BASTION VM
    strategy:
      matrix:
        team: ${{ fromJson(needs.needs-changes.outputs.teams) }}
      fail-fast: false
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # The VM uses its attached IAM Service Account automatically
    - name: Set up GKE Credentials via Internal IP
      run: |
        gcloud container clusters get-credentials autopilot-cluster \
          --region us-central1 \
          --project gke-application-project \
          --internal-ip

    # Executes deployment safely across the matrix
    - name: Dynamically Deploy to GKE
      run: |
        TEAM="${{ matrix.team }}"
        NAMESPACE="${TEAM}-environment"
        
        echo "🚀 Starting deployment for: $TEAM"
        echo "Targeting Namespace: $NAMESPACE"
        
        # 1. Handle Namespace (Idempotent creation)
        if [ -f "$TEAM/k8s/namespace.yaml" ]; then
          kubectl apply -f $TEAM/k8s/namespace.yaml
        else
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
        fi
        
        # 2. Apply the rest of the manifests inside the team's k8s folder
        kubectl apply -f $TEAM/k8s/ -n $NAMESPACE
        
        # 3. Dynamic Rollout Verification
        DEPLOYMENTS=$(grep -r "kind: Deployment" $TEAM/k8s/ -l | xargs -I {} grep "name:" {} | awk '{print $2}' | sort -u || true)
        for dep in $DEPLOYMENTS; do
          if [ ! -z "$dep" ]; then
            kubectl rollout status deployment/$dep -n $NAMESPACE --timeout=90s
          fi
        done