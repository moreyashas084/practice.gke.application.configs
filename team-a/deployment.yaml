apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-a-app
  namespace: team-a-environment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-a-app
  template:
    metadata:
      labels:
        app: team-a-app
    spec:
      containers:
      - name: web-container
        image: nginxdemos/hello:latest
        ports:
        - containerPort: 80
